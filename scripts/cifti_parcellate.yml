dataset:
- name: atlas_4s456
  action: select_atlases
  dataset: atlases
  filters: {atlas: 4S456Parcels, template: fsLR, extension: .dlabel.nii}
- name: atlas_difumo
  action: select_atlases
  dataset: difumo
  filters:
    atlas: DiFuMo
    scale: 64dimensions
    template: fsLR
    suffix: probseg
    extension: .dscalar.nii

nodes:
- name: load_bold
  action: select_data
  dataset: xcpd
  filters: {space: fsLR, desc: denoised, suffix: bold, extension: .dtseries.nii}
- name: load_alff
  action: select_data
  dataset: xcpd
  filters:
    space: fsLR
    statistic: alff
    suffix: boldmap
    extension: .dscalar.nii
    # XCP-D also outputs a smoothed ALFF that we don't want
    desc: Query.NONE
- name: parcellate_bold_4s456
  action: parcellate_timeseries
  inputs: {timeseries: load_bold, atlas: atlas_4s456}
  parameters:
    min_coverage: 0.5
    statistics:
    - mean
    - sum
    - standard_deviation
  write_outputs: true
- name: fc_bold_4s456
  action: functional_connectivity
  inputs: {timeseries: parcellate_bold_4s456}
  write_outputs: true
- name: parcellate_alff_4s456
  action: parcellate_scalar
  inputs:
    scalar: load_alff
    atlas: atlas_4s456
  parameters:
    statistics:
    - mean
    - sum
    - standard_deviation
  write_outputs: true
- name: parcellate_bold_difumo
  action: parcellate_timeseries
  inputs: {timeseries: load_bold, atlas: atlas_difumo}
  parameters:
    min_coverage: 0.5
    statistics:
    - mean
    - standard_deviation
  write_outputs: true
- name: fc_bold_difumo
  action: functional_connectivity
  inputs: {timeseries: parcellate_bold_difumo}
  write_outputs: true
- name: parcellate_alff_difumo
  action: parcellate_scalar
  inputs:
    scalar: load_alff
    atlas: atlas_difumo
  parameters:
    statistics:
    - mean
    - standard_deviation
  write_outputs: true
