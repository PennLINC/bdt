version: 2

build:
  os: ubuntu-22.04
  apt_packages:
    - graphviz
  tools:
    python: "3.12"
  commands:
    # Fetch full history so setuptools-scm can determine the version.
    - git fetch --unshallow || true
    - pip install .[doc]
    # Build serially (-j 1). sphinx-argparse's ArgParseDomain does not implement
    # merge_domaindata, so parallel builds crash during the domain-merge step.
    - python -m sphinx -T -j 1 -b html -d docs/_build/doctrees docs $READTHEDOCS_OUTPUT/html
